  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="StudyKarle — Login or signup to access your study resources." />
  <meta name="theme-color" content="#2563EB" />
  <meta property="og:title" content="StudyKarle — Login" />
  <meta property="og:description" content="Login or signup to access your study resources." />

  <title>StudyKarle — Login / Signup</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body class="auth-body">

  <header class="auth-topbar">
    <a href="/" class="auth-brand">
      <div class="auth-logo-mark">SK</div>
      <span class="auth-logo-name">StudyKarle</span>
    </a>
    <button class="theme-toggle-btn" id="theme-toggle" aria-label="Toggle theme">
      <span id="theme-icon">☀️</span>
    </button>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-tab-bar" role="tablist">
        <button class="auth-tab active" role="tab" aria-selected="true"
                aria-controls="panel-login" data-target="panel-login">Log in</button>
        <button class="auth-tab" role="tab" aria-selected="false"
                aria-controls="panel-signup" data-target="panel-signup">Sign up</button>
      </div>

      <!-- LOGIN PANEL -->
      <div class="auth-panel" id="panel-login" role="tabpanel">
        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-subtitle">Log in to access your study resources.</p>
        <div class="auth-form">
          <div class="input-group">
            <label class="input-label" for="login-email">Email</label>
            <input class="input" type="email" id="login-email"
                   placeholder="you@example.com" autocomplete="email"/>
          </div>
          <div class="input-group">
            <label class="input-label" for="login-password">Password</label>
            <input class="input" type="password" id="login-password"
                   placeholder="••••••••" autocomplete="current-password"/>
          </div>
          <button class="btn btn-primary btn-full" id="login-btn">Log in</button>
          <p class="auth-hint">No account?
            <button class="auth-link" data-switch-to="panel-signup" type="button">Sign up free →</button>
          </p>
        </div>
      </div>

      <!-- SIGNUP PANEL — hidden by default -->
      <div class="auth-panel" id="panel-signup" role="tabpanel" hidden>
        <h1 class="auth-title">Create account</h1>
        <p class="auth-subtitle">OTP verification required. Takes 30 seconds.</p>

        <!-- Step 1 -->
        <div class="auth-form" id="signup-step-1">
          <div class="input-group">
            <label class="input-label" for="signup-name">Full Name</label>
            <input class="input" type="text" id="signup-name"
                   placeholder="Nitish Kumar" autocomplete="name"/>
          </div>
          <div class="input-group">
            <label class="input-label" for="signup-email">Email</label>
            <input class="input" type="email" id="signup-email"
                   placeholder="you@example.com" autocomplete="email"/>
          </div>
          <div class="input-group">
            <label class="input-label" for="signup-password">Password</label>
            <input class="input" type="password" id="signup-password"
                   placeholder="Create a password" autocomplete="new-password"/>
          </div>
          <button class="btn btn-primary btn-full" id="send-otp-btn">Send OTP to Email</button>
          <p class="auth-hint">Have an account?
            <button class="auth-link" data-switch-to="panel-login" type="button">Log in →</button>
          </p>
        </div>

        <!-- Step 2 — OTP (hidden until OTP sent) -->
        <div class="auth-form" id="signup-step-2" hidden>
          <div class="otp-info-box">
            📬 OTP sent to <strong id="otp-target"></strong>
          </div>
          <div class="input-group">
            <label class="input-label" for="otp-input">6-digit OTP</label>
            <input class="input input-otp" type="text" id="otp-input"
                   placeholder="——————" maxlength="6" inputmode="numeric"
                   autocomplete="one-time-code"/>
            <div class="otp-row">
              <span class="otp-timer" id="otp-timer">Expires in 5:00</span>
              <button class="auth-link otp-resend" id="resend-otp-btn" type="button" disabled>Resend OTP</button>
            </div>
          </div>
          <button class="btn btn-primary btn-full" id="verify-otp-btn">Verify &amp; Create Account</button>
          <button class="btn btn-ghost btn-full" id="cancel-otp-btn">← Back</button>
        </div>
      </div>

      <p class="auth-disclaimer">
        Data is stored locally on your device. Passwords are never sent to a server.
      </p>
    </div>
  </main>

  <footer class="site-footer">
    <p class="footer-text">
      Made with <span class="footer-heart">❤️</span> by
      <a href="https://www.instagram.com/realnitishkumarr/"
         target="_blank" rel="noopener noreferrer"
         class="footer-link">Nitish Kumar</a>
    </p>
  </footer>

  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="src/script.js" type="module"></script>
</body>
</html>
