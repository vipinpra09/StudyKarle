<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="StudyKarle — Fast, organized academic resource hub for engineering students. Access notes, PYQs, assignments and tutorials in seconds." />
  <meta name="theme-color" content="#2563EB" />
  <meta property="og:title" content="StudyKarle — Study Resources, Organized Properly." />
  <meta property="og:description" content="Access notes, PYQs, assignments, tutorials, and papers in one simple place." />
  <title>StudyKarle — Study Resources, Organized Properly.</title>

  <!-- Styles -->
  <link rel="stylesheet" href="src/styles.css" />

  <!-- Favicon (inline SVG as data URI) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%232563EB'/><text y='22' x='6' font-family='sans-serif' font-weight='700' font-size='16' fill='white'>SK</text></svg>" />
</head>
<body>

<!-- ===================== HEADER ===================== -->
<header class="site-header">
  <div class="container">
    <!-- Logo -->
    <a class="logo" href="/" onclick="navigate('home'); return false;">
      <div class="logo-mark">SK</div>
      Study<span>Karle</span>
    </a>

    <!-- Header Search (desktop) -->
    <div class="header-search">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
        </svg>
        <input
          class="search-input"
          id="header-search-input"
          type="search"
          placeholder="Search resources, subjects..."
          autocomplete="off"
        />
        <div class="search-results-dropdown" id="header-search-dropdown"></div>
      </div>
    </div>

    <!-- Header Actions -->
    <div class="header-actions">
      <!-- Search icon (mobile) -->
      <button class="icon-btn" title="Search" onclick="navigate('search', {})" style="display:none" id="mobile-search-btn">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
        </svg>
      </button>

      <!-- Theme Toggle -->
      <button class="icon-btn theme-toggle-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>

      <!-- Settings -->
      <button class="icon-btn" onclick="navigate('settings')" title="Settings">
        <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M11.49 3.17c-.38-1.56-2.6-1.56-2.98 0a1.532 1.532 0 01-2.286.948c-1.372-.836-2.942.734-2.106 2.106.54.886.061 2.042-.947 2.287-1.561.379-1.561 2.6 0 2.978a1.532 1.532 0 01.947 2.287c-.836 1.372.734 2.942 2.106 2.106a1.532 1.532 0 012.287.947c.379 1.561 2.6 1.561 2.978 0a1.533 1.533 0 012.287-.947c1.372.836 2.942-.734 2.106-2.106a1.533 1.533 0 01.947-2.287c1.561-.379 1.561-2.6 0-2.978a1.532 1.532 0 01-.947-2.287c.836-1.372-.734-2.942-2.106-2.106a1.532 1.532 0 01-2.287-.947zM10 13a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"/>
        </svg>
      </button>
    </div>
  </div>
</header>

<!-- ===================== MAIN ===================== -->
<main id="main">

  <!-- HOME PAGE -->
  <div class="page" id="page-home"></div>

  <!-- YEAR PAGE -->
  <div class="page" id="page-year"></div>

  <!-- SUBJECT PAGE -->
  <div class="page" id="page-subject"></div>

  <!-- RESOURCE VIEWER PAGE -->
  <div class="page" id="page-resource"></div>

  <!-- SEARCH PAGE -->
  <div class="page" id="page-search"></div>

  <!-- SETTINGS PAGE -->
  <div class="page" id="page-settings"></div>

</main>

<!-- ===================== FOOTER ===================== -->
<footer class="site-footer">
  <div class="container">
    Made with ❤️ by <a href="https://www.instagram.com/realnitishkumarr/" target="_blank" rel="noopener noreferrer">Nitish Kumar</a>
  </div>
</footer>

<!-- ===================== BOTTOM NAV (Mobile) ===================== -->
<nav class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bnav-item active" data-page="home" onclick="navigate('home')">
      <div class="bnav-icon">🏠</div>
      Home
    </button>
    <button class="bnav-item" data-page="search" onclick="navigate('search', {})">
      <div class="bnav-icon">🔍</div>
      Search
    </button>
    <button class="bnav-item" data-page="settings" onclick="navigate('settings')">
      <div class="bnav-icon">⚙️</div>
      Settings
    </button>
  </div>
</nav>

<!-- ===================== TOAST CONTAINER ===================== -->
<div id="toast-container"></div>

<!-- ===================== SCRIPTS ===================== -->
<script src="src/data.js"></script>
<script src="src/script.js"></script>

<!-- Show mobile search button on small screens -->
<script>
  (function() {
    function checkMobile() {
      const btn = document.getElementById('mobile-search-btn');
      if (btn) btn.style.display = window.innerWidth <= 768 ? 'flex' : 'none';
    }
    checkMobile();
    window.addEventListener('resize', checkMobile);
  })();
</script>

</body>
</html>
