<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="StudyKarle — Login or signup to access your study resources." />
  <meta name="theme-color" content="#2563EB" />
  <meta property="og:title" content="StudyKarle — Login" />
  <meta property="og:description" content="Login or signup to access your study resources." />
  <meta property="og:url" content="https://studykarle.me/login.html" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:url" content="https://studykarle.me/login.html" />
  <link rel="canonical" href="https://studykarle.me/login.html" />
  <title>StudyKarle — Login / Signup</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-logo">SK</div>
        <span class="auth-brand-name">StudyKarle</span>
      </div>

      <div class="auth-tabs" role="tablist" aria-label="Authentication mode">
        <button class="auth-tab active" data-tab="login" type="button" role="tab" aria-selected="true">Log in</button>
        <button class="auth-tab" data-tab="signup" type="button" role="tab" aria-selected="false">Sign up</button>
      </div>

      <section class="auth-form" id="login-form-panel">
        <form id="login-form" novalidate>
          <div class="input-group">
            <label class="input-label" for="login-email">Email</label>
            <input class="input" id="login-email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </div>
          <div class="input-group">
            <label class="input-label" for="login-password">Password</label>
            <input class="input" id="login-password" type="password" autocomplete="current-password" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary auth-submit">Log in</button>
        </form>
      </section>

      <section class="auth-form" id="signup-form-panel" hidden>
        <form id="signup-form" novalidate>
          <div class="input-group">
            <label class="input-label" for="signup-name">Full name</label>
            <input class="input" id="signup-name" type="text" autocomplete="name" placeholder="Your name" required />
          </div>
          <div class="input-group">
            <label class="input-label" for="signup-email">Email</label>
            <input class="input" id="signup-email" type="email" autocomplete="email" placeholder="you@example.com" required />
          </div>
          <div class="input-group">
            <label class="input-label" for="signup-password">Password</label>
            <input class="input" id="signup-password" type="password" autocomplete="new-password" minlength="8" placeholder="At least 8 characters" required />
          </div>
          <button type="submit" class="btn btn-primary auth-submit" id="send-otp-btn">Send OTP</button>
        </form>

        <div id="otp-section" hidden>
          <p class="otp-info">OTP sent to <strong id="otp-target-email"></strong></p>
          <form id="otp-form" novalidate>
            <div class="input-group">
              <label class="input-label" for="otp-input">Enter OTP</label>
              <input class="input" id="otp-input" type="text" inputmode="numeric" maxlength="6" minlength="6" placeholder="6-digit code" required />
            </div>
            <p class="otp-timer">OTP expires in <span id="otp-countdown">5:00</span></p>
            <p class="otp-expired-message" id="otp-expiry-message" hidden></p>
            <button type="submit" class="btn btn-primary auth-submit" id="verify-otp-btn">Verify OTP &amp; Create Account</button>
          </form>
        </div>
      </section>

      <p class="auth-disclaimer">Account data is stored locally on your device.</p>
      <button type="button" class="btn btn-ghost theme-toggle-btn">Toggle theme</button>
    </div>
  </div>

  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="module" src="/src/login.js"></script>
</body>
</html>
